<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#1a0a00">
<title>Dust, Root & Conjure Oracle Deck</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  
  :root {
    --brown-deep: #1a0a00;
    --brown-dark: #2c1500;
    --brown-mid: #3d1f00;
    --brown-rich: #5a2d00;
    --gold: #d4a017;
    --gold-light: #f0c84a;
    --gold-pale: #f5e0a0;
    --cream: #f5e8c8;
    --text-dim: #c4a46b;
  }

  body {
    font-family: 'Georgia', serif;
    background: radial-gradient(ellipse at top, #2c1500 0%, #1a0800 40%, #0d0400 100%);
    color: var(--cream);
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* ── LOCK SCREEN ── */
  #lockScreen {
    position: fixed; inset: 0; z-index: 9999;
    background: radial-gradient(ellipse at center, #2c1500 0%, #1a0a00 60%, #0d0500 100%);
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    gap: 28px; padding: 24px;
  }
  .lock-symbol {
    width: 110px; height: 110px;
  }
  .lock-title {
    font-size: 1.5rem; letter-spacing: 0.12em; color: var(--gold-light);
    text-align: center; line-height: 1.4;
  }
  .lock-sub { font-size: 0.78rem; color: var(--text-dim); letter-spacing: 0.1em; text-align: center; }
  .lock-input-wrap { display: flex; flex-direction: column; align-items: center; gap: 14px; width: 100%; max-width: 280px; }
  #codeInput {
    width: 100%; padding: 14px 18px; text-align: center;
    background: rgba(255,255,255,0.06); border: 1px solid rgba(212,160,23,0.35);
    border-radius: 10px; color: var(--cream); font-size: 1.1rem; letter-spacing: 0.2em;
    outline: none; caret-color: var(--gold);
  }
  #codeInput:focus { border-color: var(--gold); background: rgba(255,255,255,0.09); }
  #unlockBtn {
    width: 100%; padding: 14px; border: none; border-radius: 10px; cursor: pointer;
    background: linear-gradient(135deg, #7a4800, #d4a017, #7a4800);
    color: var(--brown-deep); font-size: 0.95rem; font-weight: bold; letter-spacing: 0.12em;
    transition: opacity 0.2s;
  }
  #unlockBtn:hover { opacity: 0.85; }
  .lock-err { color: #e06060; font-size: 0.8rem; display: none; text-align: center; }

  /* ── APP WRAPPER ── */
  #app { display: none; min-height: 100vh; flex-direction: column; }

  /* ── HEADER ── */
  header {
    background: linear-gradient(180deg, #0d0500 0%, #2c1500 100%);
    border-bottom: 1px solid rgba(212,160,23,0.25);
    padding: 16px 20px; display: flex; align-items: center; justify-content: space-between;
  }
  .header-title {
    font-size: 1.05rem; letter-spacing: 0.1em; color: var(--gold-light);
    line-height: 1.3; text-align: center; flex: 1;
  }
  .header-sub { font-size: 0.65rem; color: var(--text-dim); letter-spacing: 0.12em; display: block; }
  .icon-btn {
    background: none; border: none; cursor: pointer; padding: 6px;
    color: var(--gold); font-size: 1.3rem; transition: opacity 0.2s;
  }
  .icon-btn:hover { opacity: 0.7; }

  /* ── TABS ── */
  .tabs {
    display: flex; background: var(--brown-dark);
    border-bottom: 1px solid rgba(212,160,23,0.2);
  }
  .tab {
    flex: 1; padding: 12px 6px; text-align: center; font-size: 0.72rem;
    letter-spacing: 0.08em; color: var(--text-dim); cursor: pointer; border: none;
    background: none; transition: all 0.2s; border-bottom: 2px solid transparent;
  }
  .tab.active { color: var(--gold-light); border-bottom-color: var(--gold); }

  /* ── VIEWS ── */
  .view { display: none; flex: 1; padding: 20px; }
  .view.active { display: flex; flex-direction: column; }

  /* ── SINGLE DRAW VIEW ── */
  #drawView {
    align-items: center; gap: 10px; padding-bottom: 24px;
  }

  .deck-prompt { text-align: center; color: var(--text-dim); font-size: 0.85rem; letter-spacing: 0.06em; }

  /* ── CARD WRAP — ตรง reference pattern ── */
  .card-slot {
    width: min(300px, 86vw);
    cursor: pointer;
    position: relative;
  }
  .card-inner {
    position: relative;
    width: 100%;
    padding-bottom: 178%;
  }
  .card-face {
    position: absolute; inset: 0;
    border-radius: 18px; overflow: hidden;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    border: 1.5px solid rgba(212,160,23,0.55);
    box-shadow: 0 8px 40px rgba(0,0,0,0.8), 0 0 18px rgba(212,160,23,0.12), inset 0 1px 0 rgba(212,160,23,0.1);
    transition: opacity 0.35s ease;
  }
  /* opacity-swap — class flipped อยู่บน .card-inner */
  .card-back-face  { opacity: 1; z-index: 2; }
  .card-front-face { opacity: 0; z-index: 1; }
  .card-inner.flipped .card-back-face  { opacity: 0; z-index: 1; }
  .card-inner.flipped .card-front-face { opacity: 1; z-index: 2; }

  /* BACK — image fills, text overlaid */
  .card-back-face {
    background-image: url('https://joe5253.github.io/hoodoo-oracle/71.webp');
    background-size: cover; background-position: center;
  }
  /* FRONT — ภาพเต็มใบ ไม่มี text band */
  .card-front-face {
    background: #0d0400;
  }
  .card-img-wrap {
    position: absolute; inset: 0;
  }
  .card-img-wrap img {
    width: 100%; height: 100%; object-fit: cover; display: block;
  }
  .card-text-band { display: none; }
  .card-num, .card-name, .card-msg { display: none; }

  /* ── DRAW CONTROLS ── */
  .draw-controls {
    width: 100%; max-width: 320px;
    display: flex; flex-direction: column;
    align-items: center; gap: 8px; padding-bottom: 4px;
  }
  .draw-controls-row {
    display: flex; gap: 12px; width: 100%;
  }
  .btn-draw {
    flex: 1;
    background: linear-gradient(135deg, #7a4800 0%, #d4a017 50%, #7a4800 100%);
    border: none; border-radius: 40px; cursor: pointer;
    color: var(--brown-deep);
    font-size: 0.72rem; font-weight: 700; letter-spacing: 0.18em; text-transform: uppercase;
    padding: 15px 10px;
    box-shadow: 0 4px 18px rgba(212,160,23,0.28);
    transition: opacity 0.22s, transform 0.18s;
  }
  .btn-draw:hover { opacity: 0.88; transform: translateY(-1px); }
  .btn-draw:active { transform: translateY(0); }

  .btn-shuffle {
    background: linear-gradient(135deg, #1a0a00 0%, #2c1500 100%);
    border: 1px solid rgba(212,160,23,0.32);
    color: var(--gold-light);
    font-size: 0.72rem; letter-spacing: 0.14em; text-transform: uppercase;
    padding: 15px 20px; border-radius: 40px; cursor: pointer; white-space: nowrap;
    transition: border-color 0.22s, box-shadow 0.22s;
  }
  .btn-shuffle:hover {
    border-color: var(--gold);
    box-shadow: 0 0 14px rgba(212,160,23,0.3);
  }

  .draw-hint {
    font-size: 0.65rem; color: var(--text-dim);
    letter-spacing: 0.14em; text-transform: uppercase; min-height: 12px;
  }

  /* ── SHAKE ── */
  @keyframes cardShake {
    0%,100%{ transform: translateX(0) rotate(0deg); }
    15%{ transform: translateX(-8px) rotate(-2deg); }
    30%{ transform: translateX(8px) rotate(2deg); }
    45%{ transform: translateX(-6px) rotate(-1.5deg); }
    60%{ transform: translateX(6px) rotate(1.5deg); }
    75%{ transform: translateX(-3px) rotate(-0.8deg); }
    90%{ transform: translateX(3px) rotate(0.5deg); }
  }
  .card-inner.shaking { animation: cardShake 0.55s ease-in-out; }

  /* fav button */
  .fav-wrap {
    position: absolute; top: 10px; right: 10px; z-index: 5;
  }
  .fav-btn {
    background: rgba(10,4,0,0.55); border: 1px solid rgba(212,160,23,0.3);
    border-radius: 50%; width: 40px; height: 40px;
    cursor: pointer; font-size: 1.2rem; color: var(--text-dim);
    display: flex; align-items: center; justify-content: center;
    transition: color 0.2s, background 0.2s;
  }
  .fav-btn:hover { background: rgba(10,4,0,0.75); }
  .fav-btn.active { color: #e06030; }

  /* ── BROWSE VIEW ── */
  #browseView { gap: 16px; }
  .search-bar {
    width: 100%; padding: 12px 16px;
    background: rgba(255,255,255,0.05); border: 1px solid rgba(212,160,23,0.25);
    border-radius: 10px; color: var(--cream); font-size: 0.9rem; outline: none;
    caret-color: var(--gold);
  }
  .search-bar:focus { border-color: var(--gold); }
  .card-grid {
    display: grid; grid-template-columns: repeat(2,1fr); gap: 14px;
  }
  .grid-card {
    border-radius: 12px; overflow: hidden; cursor: pointer;
    box-shadow: 0 4px 18px rgba(0,0,0,0.6);
    border: 1px solid rgba(212,160,23,0.2); transition: transform 0.2s, border-color 0.2s;
    aspect-ratio: 9/16; position: relative;
  }
  .grid-card:hover { transform: translateY(-3px); border-color: rgba(212,160,23,0.5); }
  .grid-card img { width: 100%; height: 100%; object-fit: cover; display: block; }


  /* ── FAVORITES VIEW ── */
  #favsView { gap: 16px; }
  .favs-empty { text-align: center; color: var(--text-dim); font-size: 0.85rem; margin-top: 40px; line-height: 1.7; }

  /* ── MODAL (browse → full card) ── */
  #cardModal {
    position: fixed; inset: 0; z-index: 999;
    background: rgba(5,2,0,0.9);
    display: none; align-items: center; justify-content: center; padding: 20px;
  }
  #cardModal.open { display: flex; }
  .modal-card {
    width: 100%; max-width: 340px; aspect-ratio: 9/16;
    border-radius: 18px; overflow: hidden;
    box-shadow: 0 12px 60px rgba(0,0,0,0.9);
    display: flex; flex-direction: column;
    border: 1px solid rgba(212,160,23,0.3);
    position: relative;
  }
  .modal-img { width: 100%; flex: 1; object-fit: cover; display: block; min-height: 0; }
  .modal-text {
    background: linear-gradient(180deg, rgba(28,12,0,0.95), rgba(15,6,0,0.99));
    padding: 14px 16px 18px;
    border-top: 1px solid rgba(212,160,23,0.3);
  }
  .modal-close {
    position: absolute; top: 10px; right: 10px;
    background: rgba(0,0,0,0.6); border: none; border-radius: 50%;
    width: 34px; height: 34px; color: var(--cream); font-size: 1.1rem;
    cursor: pointer; display: flex; align-items: center; justify-content: center;
  }
  .modal-fav {
    position: absolute; top: 10px; left: 10px;
    background: rgba(0,0,0,0.6); border: none; border-radius: 50%;
    width: 34px; height: 34px; font-size: 1.1rem;
    cursor: pointer; display: flex; align-items: center; justify-content: center;
    color: var(--text-dim);
  }
  .modal-fav.active { color: #e06030; }
</style>
</head>
<body>

<!-- ════════════════════ LOCK SCREEN ════════════════════ -->

<!-- ════════════════════ MAIN APP ════════════════════ -->
<div id="app">
  <!-- Header -->
  <header>
    <div style="width:32px"></div>
    <div class="header-title">
      DUST, ROOT &amp; CONJURE<br>ORACLE DECK
      <span class="header-sub">✦ PsychicSoulStar ✦ · 70 Cards</span>
    </div>
    <div style="width:32px"></div>
  </header>

  <!-- Tabs -->
  <div class="tabs">

    <button class="tab" data-view="browseView">☰ Browse</button>
    <button class="tab" data-view="favsView">♥ Saved</button>
  </div>

  <!-- ── DRAW VIEW ── -->
  <div class="view active" id="drawView">

      <div class="card-inner" id="cardInner">

        <div class="card-face card-back-face"></div>

        <div class="card-face card-front-face" id="cardFront">
          <div class="card-img-wrap"><img id="drawnImg" src="" alt=""></div>

    <div class="draw-controls">
      <span class="draw-hint" id="drawHint">Draw a card to begin</span>
      <div class="draw-controls-row">
        <button class="btn-draw" id="drawBtn">✦ DRAW A CARD</button>
        <button class="btn-shuffle" id="shuffleBtn">⟳ SHUFFLE</button>
      </div>
    </div>
  </div>

  <!-- ── BROWSE VIEW ── -->
  <div class="view" id="browseView">
    <input class="search-bar" id="searchInput" type="search" placeholder="Search cards…">
    <div class="card-grid" id="cardGrid"></div>
  </div>

  <!-- ── FAVS VIEW ── -->
  <div class="view" id="favsView">
    <div class="card-grid" id="favsGrid"></div>
    <p class="favs-empty" id="favsEmpty" style="display:none">
      No saved cards yet.<br>Tap ♥ on any card to save it here.
    </p>
  </div>
</div>

<!-- ── CARD MODAL ── -->

  <div class="modal-card">

// ═══════════════════════════════════════════
//  STATE
// ═══════════════════════════════════════════
const ACCESS_CODE = 'ROOT70';
let deck = [...CARDS];
let drawnCard = null;
let isFlipped = false;
let favs = JSON.parse(localStorage.getItem('hoodoo_favs') || '[]');
let modalCard = null;

// ═══════════════════════════════════════════
//  LOCK
// ═══════════════════════════════════════════
document.getElementById('unlockBtn').addEventListener('click', tryUnlock);
document.getElementById('codeInput').addEventListener('keydown', e => { if(e.key==='Enter') tryUnlock(); });

function tryUnlock(){
  const val = document.getElementById('codeInput').value.trim().toUpperCase();
  if(val === ACCESS_CODE){
    document.getElementById('lockScreen').style.display = 'none';
    document.getElementById('app').style.display = 'flex';
    buildBrowse(CARDS);
    renderFavs();
  } else {
    document.getElementById('lockErr').style.display = 'block';
    document.getElementById('codeInput').value = '';
  }
}

// ═══════════════════════════════════════════
//  TABS
// ═══════════════════════════════════════════
document.querySelectorAll('.tab').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.tab').forEach(b => b.classList.remove('active'));
    document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
    btn.classList.add('active');
    document.getElementById(btn.dataset.view).classList.add('active');
    if(btn.dataset.view === 'favsView') renderFavs();
  });
});

// ═══════════════════════════════════════════
//  DRAW — pattern จาก calm-signal-cards reference
// ═══════════════════════════════════════════
const mainCard = document.getElementById('cardInner');

function populateFront(card){
  document.getElementById('drawnImg').src = card.img;
}

function setHint(txt){ document.getElementById('drawHint').textContent = txt; }

function pickAndPopulate(){
  // สุ่มไพ่ — ไม่ซ้ำใบเดิม
  let idx;
  do { idx = Math.floor(Math.random() * CARDS.length); }
  while(CARDS[idx] === drawnCard && CARDS.length > 1);
  drawnCard = CARDS[idx];

  populateFront(drawnCard);
  updateDrawFav();
  setHint('Tap card to reveal ✦');
}

function drawCard(){
  if(isFlipped){
    // ไพ่เปิดหน้าอยู่ → fade กลับหลังก่อน รอ transition เสร็จ แล้วค่อยเปลี่ยนภาพ
    mainCard.classList.remove('flipped');
    isFlipped = false;
    setTimeout(pickAndPopulate, 400); // รอ opacity 0.35s + buffer
  } else {
    pickAndPopulate();
  }
}

// กดที่ตัวไพ่ → toggle flip (เหมือน reference)
mainCard.addEventListener('click', () => {
  if(!drawnCard) return;
  mainCard.classList.toggle('flipped');
  isFlipped = !isFlipped;
  setHint(isFlipped ? 'Tap card to flip back ✦' : 'Tap card to reveal ✦');
});

function shuffle(){
  // เริ่ม fade กลับหลังทันที (ถ้าเปิดอยู่) พร้อม shake
  mainCard.classList.remove('flipped');
  isFlipped = false;

  mainCard.classList.remove('shaking');
  void mainCard.offsetWidth;
  mainCard.classList.add('shaking');

  let pool = drawnCard ? CARDS.filter(c => c.n !== drawnCard.n) : CARDS;
  const next = pool[Math.floor(Math.random() * pool.length)];

  // เปลี่ยนภาพหลัง shake + fade เสร็จ (0.56s > 0.35s fade)
  setTimeout(() => {
    mainCard.classList.remove('shaking');
    drawnCard = next;
    populateFront(next);
    updateDrawFav();
    setHint('Tap card to reveal ✦');
  }, 560);
}

document.getElementById('drawBtn').addEventListener('click', drawCard);
document.getElementById('shuffleBtn').addEventListener('click', shuffle);
// ═══════════════════════════════════════════
//  FAVORITES
// ═══════════════════════════════════════════
function saveFavs(){ localStorage.setItem('hoodoo_favs', JSON.stringify(favs)); }

function isFav(n){ return favs.includes(n); }
function toggleFav(n){
  if(isFav(n)) favs = favs.filter(x => x !== n);
  else favs.push(n);
  saveFavs();
  updateDrawFav();
  updateModalFav();
}

function updateDrawFav(){
  const btn = document.getElementById('drawFavBtn');
  if(!drawnCard){ btn.classList.remove('active'); return; }
  btn.classList.toggle('active', isFav(drawnCard.n));
}
document.getElementById('drawFavBtn').addEventListener('click', (e) => {
  e.stopPropagation();
  if(!drawnCard) return;
  toggleFav(drawnCard.n);
});

function renderFavs(){
  const grid = document.getElementById('favsGrid');
  const empty = document.getElementById('favsEmpty');
  if(favs.length === 0){ grid.innerHTML=''; empty.style.display='block'; return; }
  empty.style.display='none';
  const cards = CARDS.filter(c => favs.includes(c.n));
  grid.innerHTML = cards.map(c => gridCardHTML(c)).join('');
  grid.querySelectorAll('.grid-card').forEach((el,i)=>{
    el.addEventListener('click', () => openModal(cards[i]));
  });
}

// ═══════════════════════════════════════════
//  BROWSE
// ═══════════════════════════════════════════
function gridCardHTML(c){
  return `<div class="grid-card">
    <img src="${c.img}" alt="${c.t}" loading="lazy">
  </div>`;
}

function buildBrowse(list){
  const grid = document.getElementById('cardGrid');
  grid.innerHTML = list.map(c => gridCardHTML(c)).join('');
  grid.querySelectorAll('.grid-card').forEach((el,i)=>{
    el.addEventListener('click', () => openModal(list[i]));
  });
}

document.getElementById('searchInput').addEventListener('input', function(){
  const q = this.value.trim().toLowerCase();
  const filtered = q ? CARDS.filter(c => c.t.toLowerCase().includes(q) || c.m.toLowerCase().includes(q)) : CARDS;
  buildBrowse(filtered);
});

// ═══════════════════════════════════════════
//  MODAL
// ═══════════════════════════════════════════
function openModal(card){
  modalCard = card;
  document.getElementById('modalImg').src = card.img;
  document.getElementById('modalNum').textContent = `Card ${card.n} of 70`;
  document.getElementById('modalName').textContent = card.t;
  document.getElementById('modalMsg').textContent = card.m;
  updateModalFav();
  document.getElementById('cardModal').classList.add('open');
}

function updateModalFav(){
  const btn = document.getElementById('modalFavBtn');
  if(!modalCard) return;
  btn.classList.toggle('active', isFav(modalCard.n));
}

document.getElementById('modalClose').addEventListener('click', () => {
  document.getElementById('cardModal').classList.remove('open');
  modalCard = null;
  if(document.getElementById('favsView').classList.contains('active')) renderFavs();
});

document.getElementById('cardModal').addEventListener('click', function(e){
  if(e.target === this){ 
    this.classList.remove('open');
    modalCard = null;
    if(document.getElementById('favsView').classList.contains('active')) renderFavs();
  }
});

document.getElementById('modalFavBtn').addEventListener('click', () => {
  if(!modalCard) return;
  toggleFav(modalCard.n);
  renderFavs();
});
</script>
